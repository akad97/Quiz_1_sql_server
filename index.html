<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM SQL Server — I/A\M</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 1.5rem 1rem; }
.container { max-width: 820px; margin: 0 auto; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 2rem; }

.header { text-align: center; margin-bottom: 1.5rem; border-bottom: 2px solid #1a1a1a; padding-bottom: 1rem; }
.logo { font-size: 22px; font-weight: bold; letter-spacing: 2px; color: #c0392b; border: 2.5px solid #c0392b; display: inline-block; padding: 3px 10px; margin-bottom: 0.5rem; border-radius: 4px; }
.title { font-size: 20px; font-weight: bold; font-style: italic; margin-bottom: 0.25rem; }
.subtitle { font-size: 13px; color: #555; }

.score-bar { background: #f9f9f5; border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
.score-item { text-align: center; }
.score-label { font-size: 11px; color: #777; margin-bottom: 2px; }
.score-val { font-size: 22px; font-weight: bold; color: #1a1a1a; }
.score-val.note { color: #0f6e56; }
.score-val.neg { color: #c0392b; }
.progress-wrap { flex: 1; min-width: 160px; }
.progress-bg { background: #ddd; border-radius: 99px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: #0f6e56; transition: width 0.4s; }
.progress-txt { font-size: 12px; color: #666; margin-top: 4px; }

.questions { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem; }
.question { background: #fafafa; border: 1px solid #ddd; border-radius: 8px; padding: 0.9rem 1rem; transition: border-color 0.2s; }
.question.correct { border-color: #0f6e56; background: #e1f5ee; }
.q-num { font-size: 11px; color: #888; margin-bottom: 4px; }
.q-title { font-size: 13px; font-weight: bold; color: #1a1a1a; margin-bottom: 8px; line-height: 1.45; }
.q-title code { font-family: 'Courier New', monospace; font-size: 12px; background: #eee; padding: 1px 4px; border-radius: 3px; }
.options { display: flex; flex-direction: column; gap: 4px; }
.opt { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-size: 12.5px; color: #1a1a1a; transition: background 0.15s; background: #fff; user-select: none; }
.opt:hover { background: #f0f0f0; border-color: #bbb; }
.opt.selected { background: #e6f1fb; border-color: #378add; color: #0c447c; }
.opt.correct-ans { background: #e1f5ee !important; border-color: #0f6e56 !important; color: #085041 !important; }
.opt-letter { font-weight: bold; font-size: 11px; min-width: 16px; }

.result-panel { display: none; background: #f9f9f5; border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
.result-panel h2 { font-size: 18px; margin-bottom: 0.5rem; }
.result-note { font-size: 42px; font-weight: bold; }
.result-detail { font-size: 13px; color: #555; margin-top: 6px; }
.badge { display: inline-block; padding: 4px 14px; border-radius: 99px; font-size: 13px; font-weight: bold; margin-top: 10px; }

.actions { display: flex; gap: 10px; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
.btn { padding: 9px 22px; border-radius: 6px; border: 1px solid #bbb; font-size: 13px; cursor: pointer; background: #fff; color: #1a1a1a; transition: background 0.15s; }
.btn:hover { background: #f0f0f0; }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn.primary { background: #c0392b; color: #fff; border-color: #c0392b; font-weight: bold; }
.btn.primary:hover { background: #a93226; }

.scoring-info { font-size: 12px; color: #666; text-align: center; margin-top: 0.75rem; }

@media (max-width: 600px) {
  .questions { grid-template-columns: 1fr; }
  .score-bar { gap: 0.75rem; }
  .container { padding: 1rem; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">I/A\M</div>
    <div class="title">Devoir : SQL Server</div>
    <div class="subtitle">QCM — 20 questions · Durée conseillée : 1 heure</div>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Répondues</div>
      <div class="score-val" id="s-answered">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Bonnes</div>
      <div class="score-val note" id="s-correct">0</div>
    </div>

    <div class="score-item">
      <div class="score-label">Note /20</div>
      <div class="score-val" id="s-score">—</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bg"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-txt" id="progress-txt">0 / 20 questions répondues</div>
    </div>
  </div>

  <div class="result-panel" id="result-panel">
    <h2>Résultat final</h2>
    <div class="result-note" id="res-note"></div>
    <div class="result-detail" id="res-detail"></div>
    <div id="res-badge"></div>
  </div>

  <div class="questions" id="questions-container"></div>

  <div class="actions">
    <button class="btn primary" onclick="submitQuiz()" id="btn-submit">Valider le QCM</button>
    <button class="btn" onclick="toggleAnswers()" id="btn-show" style="display:none">Voir les réponses</button>
    <button class="btn" onclick="resetQuiz()" style="display:none" id="btn-reset">&#8635; Recommencer</button>
  </div>
  <div class="scoring-info">Bonne réponse : +1 &nbsp;|&nbsp; Mauvaise réponse : 0 &nbsp;|&nbsp; Sans réponse : 0</div>

</div>

<script>
const questions = [
  { q: "1. SQL Server est développé par :", opts: ["Oracle","IBM","Microsoft","Google"], ans: 2 },
  { q: "2. Le langage utilisé par SQL Server est :", opts: ["MySQL","PL/SQL","T-SQL (Transact-SQL)","PostgreSQL"], ans: 2 },
  { q: "3. SQL Server est un système de gestion de base de données :", opts: ["Hiérarchique","Relationnel et transactionnel","Fichier-texte","Réseau"], ans: 1 },
  { q: "4. SQL Server est utilisé pour :", opts: ["Créer des systèmes d'exploitation","Traiter des transactions et stocker des données","Développer des navigateurs web","Compiler des programmes"], ans: 1 },
  { q: "5. Le logiciel pour gérer SQL Server est :", opts: ["Visual Studio","SSMS (SQL Server Management Studio)","Eclipse","Azure Studio"], ans: 1 },
  { q: "6. Un SGBD est :", opts: ["Système de gestion de bureautique","Système de gestion de bases de données","Système de gestion de blogs","Système de gestion de bibliothèques"], ans: 1 },
  { q: "7. Les déclencheurs (Triggers) sont :", opts: ["Des requêtes automatiques sur des événements","Des types de données","Des erreurs SQL","Des programmes autonomes"], ans: 0 },
  { q: "8. SQL Server peut gérer :", opts: ["Une seule transaction à la fois","Plusieurs utilisateurs en simultané","Un seul utilisateur","Aucune transaction"], ans: 1 },
  { q: "9. SQL est un langage :", opts: ["Pour créer des pages web","Conçu pour la gestion de bases de données relationnelles","De programmation système","Pour le développement mobile"], ans: 1 },
  { q: "10. SQL signifie :", opts: ["Simple Query Language","Structured Query Language","Short Quick Language","Smart Query Language"], ans: 1 },
  { q: "11. Le premier nom de SQL était :", opts: ["SQL+","Structured English Query Language (SEQUEL)","Data Query Language","Rapid SQL"], ans: 1 },
  { q: "12. Une clé primaire :", opts: ["Permet d'avoir plusieurs lignes identiques","Identifie de manière unique chaque ligne","Est utilisée pour créer des index","Sert à crypter les données"], ans: 1 },
  { q: "13. Une clé étrangère :", opts: ["Crée une nouvelle table","Supprime des données","Fait le lien entre deux tables","Change le type de données"], ans: 2 },
  { q: "14. Parmi les SGBDR, on trouve :", opts: ["MongoDB","MySQL","Redis","Cassandra"], ans: 1 },
  { q: "15. NoSQL signifie :", opts: ["No Simple Query Language","Not Only SQL","No Standard Query Language","Not Official SQL"], ans: 1 },
  { q: "16. Les bases NoSQL sont adaptées quand :", opts: ["Les données sont fortement structurées","Il faut respecter absolument l'ACID","L'évolutivité et la flexibilité sont prioritaires","Les bases sont très petites"], ans: 2 },
  { q: "17. En SQL, la commande pour créer une base est :", opts: ["MAKE DATABASE","SET DATABASE","CREATE DATABASE","INIT DATABASE"], ans: 2 },
  { q: "18. En SQL, la commande pour ajouter une colonne est :", opts: ["INSERT COLUMN","ADD COLUMN","UPDATE COLUMN","MODIFY COLUMN"], ans: 1 },
  { q: "19. En SQL, <code>SELECT * FROM table</code> permet de :", opts: ["Supprimer une table","Modifier une table","Lister toutes les données d'une table","Joindre deux tables"], ans: 2 },
  { q: "20. La clause <code>ORDER BY</code> sert à :", opts: ["Grouper les résultats","Trier les résultats","Supprimer les doublons","Ajouter une contrainte"], ans: 1 }
];

const letters = ['a','b','c','d'];
let userAnswers = new Array(20).fill(null);
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.id = 'q-' + qi;
    let html = `<div class="q-num">Question ${qi + 1} / 20</div>`;
    html += `<div class="q-title">${q.q}</div>`;
    html += `<div class="options">`;
    q.opts.forEach((opt, oi) => {
      html += `<div class="opt" id="opt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})">`;
      html += `<span class="opt-letter">${letters[oi]})</span>${opt}</div>`;
    });
    html += `</div>`;
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function selectOpt(qi, oi) {
  if (submitted) return;
  const prev = userAnswers[qi];
  userAnswers[qi] = oi;
  if (prev !== null) document.getElementById(`opt-${qi}-${prev}`).classList.remove('selected');
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  updateScore();
}

function updateScore() {
  const answered = userAnswers.filter(a => a !== null).length;
  let correct = 0, wrong = 0;
  userAnswers.forEach((a, i) => {
    if (a === null) return;
    if (a === questions[i].ans) correct++;
    else wrong++;
  });
  const note = correct;
  document.getElementById('s-answered').textContent = answered;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-score').textContent = answered > 0 ? note : '—';
  document.getElementById('progress-fill').style.width = Math.round(answered / 20 * 100) + '%';
  document.getElementById('progress-txt').textContent = answered + ' / 20 questions répondues';
}

let answersVisible = false;

function showAnswers() {
  questions.forEach((q, qi) => {
    letters.forEach((_, oi) => {
      const el = document.getElementById(`opt-${qi}-${oi}`);
      if (oi === q.ans) el.classList.add('correct-ans');
    });
  });
}

function hideAnswers() {
  questions.forEach((_, qi) => {
    [0,1,2,3].forEach(oi => {
      document.getElementById(`opt-${qi}-${oi}`).classList.remove('correct-ans');
    });
  });
}

function toggleAnswers() {
  const btn = document.getElementById('btn-show');
  if (answersVisible) {
    hideAnswers();
    answersVisible = false;
    btn.textContent = 'Voir les réponses';
  } else {
    showAnswers();
    answersVisible = true;
    btn.textContent = 'Cacher les réponses';
  }
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  document.getElementById('btn-submit').style.display = 'none';

  let correct = 0, wrong = 0;
  userAnswers.forEach((a, i) => {
    const qDiv = document.getElementById('q-' + i);
    if (a === null) return;
    if (a === questions[i].ans) { qDiv.classList.add('correct'); correct++; }
    else { wrong++; }
  });

  const note = correct;
  const noteFmt = note.toFixed(0);
  const unanswered = 20 - correct - wrong;

  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  document.getElementById('res-note').textContent = noteFmt + ' / 20';
  document.getElementById('res-detail').textContent =
    correct + ' bonne(s) (+' + correct + ') · ' +
    wrong + ' mauvaise(s) (0) · ' +
    unanswered + ' sans réponse';

  let mention = '', badgeStyle = '';
  if (note >= 16)     { mention = 'Excellent !';  badgeStyle = 'background:#e1f5ee;color:#085041;'; }
  else if (note >= 12) { mention = 'Bien';          badgeStyle = 'background:#e6f1fb;color:#0c447c;'; }
  else if (note >= 10) { mention = 'Passable';      badgeStyle = 'background:#faeeda;color:#412402;'; }
  else                 { mention = 'À revoir';      badgeStyle = 'background:#fdecea;color:#791f1f;'; }
  document.getElementById('res-badge').innerHTML =
    `<span class="badge" style="${badgeStyle}">${mention}</span>`;

  updateScore();
  document.getElementById('btn-show').style.display = '';
  document.getElementById('btn-reset').style.display = '';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetQuiz() {
  userAnswers = new Array(20).fill(null);
  submitted = false;
  answersVisible = false;
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('btn-submit').style.display = '';
  document.getElementById('btn-show').style.display = 'none';
  document.getElementById('btn-show').textContent = 'Voir les réponses';
  document.getElementById('btn-reset').style.display = 'none';
  buildQuiz();
  updateScore();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
