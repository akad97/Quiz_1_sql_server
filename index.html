<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM SQL Server — I/A\M</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: Arial, sans-serif;
background: #f5f5f0;
color: #1a1a1a;
padding: 1.5rem 1rem;
}

.container {
max-width: 820px;
margin: 0 auto;
background: #fff;
border: 1px solid #ddd;
border-radius: 10px;
padding: 2rem;
}

.header {
text-align: center;
margin-bottom: 1.5rem;
border-bottom: 2px solid #1a1a1a;
padding-bottom: 1rem;
}

.logo {
font-size: 22px;
font-weight: bold;
letter-spacing: 2px;
color: #c0392b;
border: 2.5px solid #c0392b;
display: inline-block;
padding: 3px 10px;
margin-bottom: 0.5rem;
border-radius: 4px;
}

.title {
font-size: 20px;
font-weight: bold;
font-style: italic;
margin-bottom: 0.25rem;
}

.subtitle {
font-size: 13px;
color: #555;
}

.score-bar {
background: #f9f9f5;
border: 1px solid #ddd;
border-radius: 8px;
padding: 1rem 1.25rem;
margin-bottom: 1.5rem;
display: flex;
gap: 1.5rem;
flex-wrap: wrap;
align-items: center;
}

.score-item { text-align: center; }

.score-label {
font-size: 11px;
color: #777;
margin-bottom: 2px;
}

.score-val {
font-size: 22px;
font-weight: bold;
color: #1a1a1a;
}

.score-val.note { color: #0f6e56; }

.progress-wrap {
flex: 1;
min-width: 160px;
}

.progress-bg {
background: #ddd;
border-radius: 99px;
height: 8px;
overflow: hidden;
}

.progress-fill {
height: 100%;
border-radius: 99px;
background: #0f6e56;
transition: width 0.4s;
}

.progress-txt {
font-size: 12px;
color: #666;
margin-top: 4px;
}

.questions {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap: 1rem;
}

.question {
background: #fafafa;
border: 1px solid #ddd;
border-radius: 8px;
padding: 0.9rem 1rem;
transition: border-color 0.2s;
}

.question.correct {
border-color: #0f6e56;
background: #e1f5ee;
}

.q-num {
font-size: 11px;
color: #888;
margin-bottom: 4px;
}

.q-title {
font-size: 13px;
font-weight: bold;
margin-bottom: 8px;
line-height: 1.45;
}

.options {
display: flex;
flex-direction: column;
gap: 4px;
}

.opt {
display: flex;
align-items: center;
gap: 8px;
padding: 5px 8px;
border-radius: 6px;
border: 1px solid #ddd;
cursor: pointer;
font-size: 12.5px;
background: #fff;
}

.opt:hover { background: #f0f0f0; }

.opt.selected {
background: #e6f1fb;
border-color: #378add;
}

.opt.correct-ans {
background: #e1f5ee !important;
border-color: #0f6e56 !important;
}

.opt-letter {
font-weight: bold;
font-size: 11px;
min-width: 16px;
}

.result-panel {
display: none;
background: #f9f9f5;
border: 1px solid #ddd;
border-radius: 8px;
padding: 1.25rem;
margin-bottom: 1.5rem;
text-align: center;
}

.result-note {
font-size: 42px;
font-weight: bold;
}

.badge {
display: inline-block;
padding: 4px 14px;
border-radius: 99px;
font-size: 13px;
font-weight: bold;
margin-top: 10px;
}

.actions {
display: flex;
gap: 10px;
justify-content: center;
margin-top: 1.5rem;
flex-wrap: wrap;
}

.btn {
padding: 9px 22px;
border-radius: 6px;
border: 1px solid #bbb;
font-size: 13px;
cursor: pointer;
background: #fff;
}

.btn.primary {
background: #c0392b;
color: white;
font-weight: bold;
}

.scoring-info {
font-size: 12px;
color: #666;
text-align: center;
margin-top: 0.75rem;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">I/A\M</div>
<div class="title">Devoir : SQL Server</div>
<div class="subtitle">QCM — 20 questions</div>
</div>

<div class="score-bar">

<div class="score-item">
<div class="score-label">Répondues</div>
<div class="score-val" id="s-answered">0</div>
</div>

<div class="score-item">
<div class="score-label">Bonnes</div>
<div class="score-val note" id="s-correct">0</div>
</div>

<div class="score-item">
<div class="score-label">Note /20</div>
<div class="score-val" id="s-score">—</div>
</div>

<div class="progress-wrap">
<div class="progress-bg">
<div class="progress-fill" id="progress-fill"></div>
</div>
<div class="progress-txt" id="progress-txt">
0 / 20 questions répondues
</div>
</div>

</div>

<div class="result-panel" id="result-panel">
<h2>Résultat final</h2>
<div class="result-note" id="res-note"></div>
<div id="res-badge"></div>
</div>

<div class="questions" id="questions-container"></div>

<div class="actions">

<button class="btn primary"
onclick="submitQuiz()" id="btn-submit">
Valider le QCM
</button>

<button class="btn"
onclick="toggleAnswers()" id="btn-show"
style="display:none">
Voir les réponses
</button>

<button class="btn"
onclick="resetQuiz()" id="btn-reset"
style="display:none">
Recommencer
</button>

</div>

<div class="scoring-info">
Bonne réponse : +1 | Mauvaise réponse : 0 | Sans réponse : 0
</div>

</div>

<script>

const questions = [
{ q:"SQL Server est développé par :", opts:["Oracle","IBM","Microsoft","Google"], ans:2 },
{ q:"Le langage utilisé par SQL Server est :", opts:["MySQL","PL/SQL","T-SQL","PostgreSQL"], ans:2 },
{ q:"SQL Server est un SGBD :", opts:["Hiérarchique","Relationnel","Fichier","Réseau"], ans:1 }
];

const letters=['a','b','c','d'];

let userAnswers=new Array(questions.length).fill(null);

let submitted=false;

function buildQuiz(){

const container=document.getElementById('questions-container');

container.innerHTML='';

questions.forEach((q,qi)=>{

const div=document.createElement('div');

div.className='question';

div.id='q-'+qi;

let html=`<div class="q-num">Question ${qi+1}</div>`;

html+=`<div class="q-title">${q.q}</div>`;

html+=`<div class="options">`;

q.opts.forEach((opt,oi)=>{

html+=`<div class="opt" onclick="selectOpt(${qi},${oi})"
id="opt-${qi}-${oi}">
<span class="opt-letter">${letters[oi]})</span>
${opt}
</div>`;

});

html+='</div>';

div.innerHTML=html;

container.appendChild(div);

});

}

function selectOpt(qi,oi){

if(submitted) return;

userAnswers[qi]=oi;

buildQuiz();

updateScore();

}

function updateScore(){

const answered=userAnswers.filter(a=>a!==null).length;

let correct=0;

userAnswers.forEach((a,i)=>{

if(a===questions[i].ans) correct++;

});

const note=(correct/questions.length)*20;

document.getElementById('s-answered').textContent=answered;

document.getElementById('s-correct').textContent=correct;

document.getElementById('s-score').textContent=
answered>0?note.toFixed(2):'—';

document.getElementById('progress-fill').style.width=
Math.round(answered/questions.length*100)+'%';

document.getElementById('progress-txt').textContent=
answered+' / '+questions.length+' questions répondues';

}

function submitQuiz(){

submitted=true;

let correct=0;

userAnswers.forEach((a,i)=>{

if(a===questions[i].ans){

correct++;

document.getElementById('q-'+i)
.classList.add('correct');

}

});

const note=(correct/questions.length)*20;

document.getElementById('result-panel').style.display='block';

document.getElementById('res-note').textContent=
note.toFixed(2)+' / 20';

}

function resetQuiz(){

userAnswers=new Array(questions.length).fill(null);

submitted=false;

buildQuiz();

updateScore();

}

buildQuiz();

</script>

</body>
</html>
